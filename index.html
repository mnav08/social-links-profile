<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="design/styles.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main>
      <article class="card-container flex-column">
        <!--flex container 1-->
        <div class="user-info flex-column">
          <figure class="img-container">
            <img
              src="./assets/images/avatar-jessica.jpeg"
              alt="Profile picture"
            />
          </figure>
          <p class="header-1">Jessica Randall</p>
          <small class="header-2">London, United Kingdom</small>
        </div>

        <!--flex container 2-->
        <div class="list-container flex-column">
          <p class="header-3">"Front-end developer and avid reader."</p>
          <a href="#">GitHub</a>
          <a href="#">Frontend Mentor</a>
          <a href="#"> LinkedIn</a>
          <a href="#">Twitter</a>
          <a href="#">Instagram</a>
        </div>
      </article>
    </main>
  </body>
</html>
